### xxl-job admin address list, such as "http://address" or "http://address01,http://address02"
xxl.job.admin.addresses=http://127.0.0.1:8080
### xxl-job timeout by second, default 3s
xxl.job.admin.timeout=3

### xxl-job executor enable, default true
xxl.job.executor.enabled=true
### xxl-job executor appname
xxl.job.executor.appname=xxl-job-executor-sample
### xxl-job executor access token
xxl.job.executor.accessToken=default_token
### xxl-job executor ip: used for register, will get from network if empty
xxl.job.executor.ip=
### xxl-job executor port: used for register, will attempt to generate automatically if empty
xxl.job.executor.port=9998
### xxl-job executor address: preferred used for register, will use ip:port if empty
xxl.job.executor.address=
### xxl-job executor log-path
xxl.job.executor.logpath=/data/applogs/xxl-job/jobhandler
### xxl-job executor log-retention-days
xxl.job.executor.logretentiondays=30
### xxl-job executor glue (non-BEAN) task enable, default true
xxl.job.executor.glueenabled=true