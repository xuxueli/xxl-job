# 测试环境配置
spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.DataRedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  redis:
    host: localhost
    port: 6379
    password:
    database: 0

writing:
  platform:
    jwt:
      secret: test-jwt-secret-key-for-testing-only-32-chars
      expiration-hours: 24
      strict-validation: false
    auth:
      mock-enabled: false

xxl:
  job:
    executor:
      enabled: false
      appname: writing-platform-test
      address: ''
      ip: ''
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
      excludedpackage: ''
    admin:
      addresses: http://localhost:8080/xxl-job-admin
      accessToken: test-access-token
      timeout: 3000

springdoc:
  swagger-ui:
    enabled: false